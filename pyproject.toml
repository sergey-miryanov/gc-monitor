[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "examplepkg"
version = "0.1.0"
description = "A modern Python packaging skeleton"
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
authors = [
  { name = "Your Name", email = "you@example.com" }
]
dependencies = []

[project.urls]
Homepage = "https://example.com"

[tool.setuptools.packages.find]
where = ["src"]
